name: CloneUber CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:       
  checks: write
  contents: read

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — Tests
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos a mvnw
        run: chmod +x mvnw

      - name: Ejecutar tests
        run: ./mvnw test

      - name: Publicar resultados
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados JUnit
          path: target/surefire-reports/*.xml
          reporter: java-junit

  # ─────────────────────────────────────────────
  # JOB 2 — Build y push a Docker Hub
  # Solo en push a main, si los tests pasan
  # ─────────────────────────────────────────────
  publish:
    name: 🐳 Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dar permisos a mvnw
        run: chmod +x mvnw

      - name: Compilar JAR
        run: ./mvnw package -DskipTests

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cloneuber:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/cloneuber:latest
