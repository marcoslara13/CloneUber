version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: uber_postgres
    environment:
      POSTGRES_DB: uberdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: uber_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: